<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ular Tangga Seru</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    text-align: center;
    margin: 0;
    padding: 10px;
}

h1 { color: white; }

#board {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    max-width: 500px;
    margin: auto;
}

.cell {
    aspect-ratio: 1/1;
    background: white;
    border-radius: 8px;
    font-size: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.player {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    position: absolute;
}

.p1 { background: red; bottom: 2px; left: 2px; }
.p2 { background: blue; bottom: 2px; right: 2px; }

/* VISUAL */
.snake { background: #ef5350 !important; color: white; }
.ladder { background: #66bb6a !important; color: white; }
.task { background: #ffe082 !important; }

button {
    padding: 12px 24px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: white;
    font-size: 16px;
}

#info, #diceView {
    color: white;
    font-weight: bold;
}
</style>
</head>

<body>

<h1>🎲 Ular Tangga</h1>
<div id="diceView">🎲</div>

<div id="board"></div>

<button onclick="rollDice()">Roll Dadu</button>
<div id="info">Giliran Player 1</div>

<audio id="diceSound" src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3"></audio>

<script>
const board = document.getElementById("board");

let players = [
    { position: 1 },
    { position: 1 }
];

let currentPlayer = 0;

// 🐍 ULAR
const snakes = {
    99: 54,
    70: 55,
    52: 42,
    25: 2
};

// 🪜 TANGGA
const ladders = {
    6: 25,
    11: 40,
    60: 85,
    46: 90
};

// 🎯 TASK
const tasks = {
    5: "Nyanyi lagu bebas!",
    13: "Lompat 5x!",
    22: "Ceritakan joke!",
    37: "Push up 5x!",
    48: "Tirukan hewan!",
    66: "Tahan napas 10 detik!",
    79: "Ketawa tanpa suara!",
    88: "Acting sedih!"
};

let cells = [];

// Generate board
for (let row = 10; row >= 1; row--) {
    let start = (row - 1) * 10 + 1;
    let end = row * 10;

    let numbers = [];
    for (let i = start; i <= end; i++) numbers.push(i);

    if (row % 2 === 0) numbers.reverse();

    numbers.forEach(num => {
        const div = document.createElement("div");
        div.classList.add("cell");
        div.id = "cell-" + num;
        div.innerText = num;

        // 🎨 Tandai
        if (snakes[num]) div.classList.add("snake");
        if (ladders[num]) div.classList.add("ladder");
        if (tasks[num]) div.classList.add("task");

        board.appendChild(div);
        cells[num] = div;
    });
}

function renderPlayers() {
    document.querySelectorAll(".player").forEach(p => p.remove());

    players.forEach((p, i) => {
        const marker = document.createElement("div");
        marker.classList.add("player", "p" + (i + 1));
        cells[p.position].appendChild(marker);
    });
}

async function movePlayer(player, steps) {
    for (let i = 0; i < steps; i++) {
        player.position++;
        renderPlayers();
        await new Promise(r => setTimeout(r, 200));
    }
}

async function rollDice() {
    const dice = Math.floor(Math.random() * 6) + 1;

    document.getElementById("diceSound").play();
    document.getElementById("diceView").innerText = "🎲 " + dice;

    let player = players[currentPlayer];

    if (player.position + dice <= 100) {
        await movePlayer(player, dice);
    }

    // 🪜 Tangga
    // PRIORITAS: hanya 1 event
if (ladders[player.position]) {
    alert("🪜 Naik tangga!");
    player.position = ladders[player.position];

} else if (snakes[player.position]) {
    alert("🐍 Digigit ular!");
    player.position = snakes[player.position];
}

    // 🎯 Task
    if (tasks[player.position]) {
        alert("🎯 Tantangan:\n" + tasks[player.position]);
    }

    renderPlayers();

    if (player.position === 100) {
        document.getElementById("info").innerText =
            `🎉 Player ${currentPlayer + 1} Menang!`;
        return;
    }

    currentPlayer = (currentPlayer + 1) % players.length;

    document.getElementById("info").innerText =
        `Giliran Player ${currentPlayer + 1}`;
}

renderPlayers();
</script>

</body>
</html>
