<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ular Tangga Seru</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    text-align: center;
    margin: 0;
    padding: 10px;
}

#board {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 5px;
    max-width: 500px;
    margin: auto;
}

.cell {
    aspect-ratio: 1/1;
    background: white;
    border-radius: 8px;
    font-size: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* PLAYER IMAGE */
.player img {
    width: 20px;
    position: absolute;
    bottom: 2px;
}

/* COLORS */
.snake { background: #ef5350; color: white; }
.ladder { background: #66bb6a; color: white; }
.task { background: #ffe082; }

button {
    padding: 12px 24px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: orange;
    color: white;
    font-size: 16px;
}

/* MODAL */
.modal {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.6);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:white;
    padding:20px;
    border-radius:12px;
    text-align:center;
    max-width:300px;
}

.modal-content img {
    width:100px;
    margin-bottom:10px;
}

.close-btn {
    margin-top:10px;
    padding:8px 16px;
    border:none;
    background:#4caf50;
    color:white;
    border-radius:8px;
}
</style>
</head>

<body>

<h2 id="diceView">🎲</h2>
<div id="board"></div>
<button onclick="rollDice()">Roll Dadu</button>
<div id="info">Giliran Player 1</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <img id="modalImg">
    <h3 id="modalTitle"></h3>
    <button class="close-btn" onclick="closeModal()">OK</button>
  </div>
</div>

<script>
const board = document.getElementById("board");

let players = [
    { position: 1, img: "assets/player1.png" },
    { position: 1, img: "assets/player2.png" }
];

let currentPlayer = 0;

const snakes = { 99:54, 70:55, 52:42, 25:2 };
const ladders = { 6:25, 11:40, 60:85, 46:90 };

const tasks = {
    5: "Nyanyi lagu!",
    13: "Lompat 5x!",
    22: "Joke lucu!",
    37: "Push up!",
};

let cells = [];

// MODAL
function showModal(img, text) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modalImg").src = img;
    document.getElementById("modalTitle").innerText = text;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// BOARD
for (let row = 10; row >= 1; row--) {
    let start = (row - 1) * 10 + 1;
    let end = row * 10;

    let nums = [];
    for (let i = start; i <= end; i++) nums.push(i);
    if (row % 2 === 0) nums.reverse();

    nums.forEach(num => {
        const div = document.createElement("div");
        div.className = "cell";
        div.innerText = num;

        if (snakes[num]) div.classList.add("snake");
        if (ladders[num]) div.classList.add("ladder");
        if (tasks[num]) div.classList.add("task");

        board.appendChild(div);
        cells[num] = div;
    });
}

// RENDER PLAYER
function renderPlayers() {
    document.querySelectorAll(".player").forEach(e => e.remove());

    players.forEach(p => {
        const el = document.createElement("div");
        el.className = "player";

        const img = document.createElement("img");
        img.src = p.img;

        el.appendChild(img);
        cells[p.position].appendChild(el);
    });
}

// MOVE
async function movePlayer(player, steps) {
    for (let i = 0; i < steps; i++) {
        player.position++;
        renderPlayers();
        await new Promise(r => setTimeout(r, 200));
    }
}

// MAIN
async function rollDice() {
    const dice = Math.floor(Math.random() * 6) + 1;
    document.getElementById("diceView").innerText = "🎲 " + dice;

    let player = players[currentPlayer];

    if (player.position + dice <= 100) {
        await movePlayer(player, dice);
    }

    // PRIORITAS EVENT
    if (ladders[player.position]) {
        player.position = ladders[player.position];
        showModal("assets/ladder.png", "Naik Tangga!");

    } else if (snakes[player.position]) {
        player.position = snakes[player.position];
        showModal("assets/snake.png", "Digigit Ular!");

    } else if (tasks[player.position]) {
        showModal("assets/task.png", tasks[player.position]);
    }

    renderPlayers();

    if (player.position === 100) {
        showModal("assets/task.png", "Player " + (currentPlayer+1) + " Menang!");
        return;
    }

    currentPlayer = (currentPlayer + 1) % players.length;
    document.getElementById("info").innerText =
        "Giliran Player " + (currentPlayer + 1);
}

renderPlayers();
</script>

</body>
</html>
